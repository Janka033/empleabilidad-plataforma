services:
  # ─────────────────────────────────────────
  # PostgreSQL — base de datos local
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: empleouni_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - empleouni_network

  # ─────────────────────────────────────────
  # ms-auth — Node.js autenticación (Puerto 3001)
  # ─────────────────────────────────────────
  ms-auth:
    build:
      context: ./ms-auth
      dockerfile: Dockerfile
    container_name: empleouni_ms_auth
    restart: unless-stopped
    environment:
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-empleouni_secret_dev_change_in_prod}
      PERFILES_SERVICE_URL: http://ms-perfiles:3002
      AUDIT_SERVICE_URL: http://ms-audit:3007
      FILES_SERVICE_URL: http://ms-files:3009
      NOTIFICACIONES_SERVICE_URL: http://ms-notifications:3008
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: empleouni_auth
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - empleouni_network

  # ─────────────────────────────────────────
  # ms-perfiles — Node.js perfiles (Puerto 3002)
  # ─────────────────────────────────────────
  ms-perfiles:
    build:
      context: ./ms-perfiles
      dockerfile: Dockerfile
    container_name: empleouni_ms_perfiles
    restart: unless-stopped
    environment:
      PORT: 3002
      JWT_SECRET: ${JWT_SECRET:-empleouni_secret_dev_change_in_prod}
      VACANTES_SERVICE_URL: http://ms-vacantes:3003
      AUTH_SERVICE_URL: http://ms-auth:3001
      AUDIT_SERVICE_URL: http://ms-audit:3007
      NOTIFICACIONES_SERVICE_URL: http://ms-notifications:3008
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: empleouni_perfiles
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      NODE_ENV: development
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - empleouni_network

  # ─────────────────────────────────────────
  # ms-vacantes — Node.js vacantes (Puerto 3003)
  # ─────────────────────────────────────────
  ms-vacantes:
    build:
      context: ./ms-vacantes
      dockerfile: Dockerfile
    container_name: empleouni_ms_vacantes
    restart: unless-stopped
    environment:
      PORT: 3003
      JWT_SECRET: ${JWT_SECRET:-empleouni_secret_dev_change_in_prod}
      AUDIT_SERVICE_URL: http://ms-audit:3007
      ES_URL: http://elasticsearch:9200
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: empleouni_vacantes
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      NODE_ENV: development
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - empleouni_network

  # ─────────────────────────────────────────
  # ms-matching — Python FastAPI emparejamiento (Puerto 3004)
  # ─────────────────────────────────────────
  ms-matching:
    build:
      context: ./ms-matching
      dockerfile: Dockerfile
    container_name: empleouni_ms_matching
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET:-empleouni_secret_dev_change_in_prod}
      PERFILES_SERVICE_URL: http://ms-perfiles:3002
      VACANTES_SERVICE_URL: http://ms-vacantes:3003
      CORS_ORIGIN: "*"
    ports:
      - "3004:3004"
    depends_on:
      - ms-perfiles
      - ms-vacantes
    networks:
      - empleouni_network

  # ─────────────────────────────────────────
  # ms-practicas — Node.js prácticas profesionales (Puerto 3005)
  # ─────────────────────────────────────────
  ms-practicas:
    build:
      context: ./ms-practicas
      dockerfile: Dockerfile
    container_name: empleouni_ms_practicas
    restart: unless-stopped
    environment:
      PORT: 3005
      JWT_SECRET: ${JWT_SECRET:-empleouni_secret_dev_change_in_prod}
      PERFILES_SERVICE_URL: http://ms-perfiles:3002
      AUDIT_SERVICE_URL: http://ms-audit:3007
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: empleouni_practicas
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      NODE_ENV: development
    ports:
      - "3005:3005"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - empleouni_network

  # ─────────────────────────────────────────
  # ElasticSearch — buscador avanzado de vacantes (RF06)
  # ─────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: empleouni_elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - empleouni_network

  # ─────────────────────────────────────────
  # MinIO — almacenamiento de objetos S3-compatible + consola (http://localhost:9001)
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: empleouni_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Consola web
    volumes:
      - minio_data:/data
    networks:
      - empleouni_network

  # ─────────────────────────────────────────
  # ms-files — Node.js documentos en S3/MinIO (Puerto 3009)
  # ─────────────────────────────────────────
  ms-files:
    build:
      context: ./ms-files
      dockerfile: Dockerfile
    container_name: empleouni_ms_files
    restart: unless-stopped
    environment:
      PORT: 3009
      JWT_SECRET: ${JWT_SECRET:-empleouni_secret_dev_change_in_prod}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: empleouni-documentos
      PUBLIC_FILES_URL: http://localhost:3009
      CORS_ORIGIN: "*"
    ports:
      - "3009:3009"
    depends_on:
      - minio
    networks:
      - empleouni_network

  # ─────────────────────────────────────────
  # Mailpit — captura de correos SMTP + UI web (http://localhost:8025)
  # ─────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: empleouni_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"   # UI web
      - "1025:1025"   # SMTP
    networks:
      - empleouni_network

  # ─────────────────────────────────────────
  # ms-notifications — Node.js envío de correos (Puerto 3008)
  # ─────────────────────────────────────────
  ms-notifications:
    build:
      context: ./ms-notifications
      dockerfile: Dockerfile
    container_name: empleouni_ms_notifications
    restart: unless-stopped
    environment:
      PORT: 3008
      JWT_SECRET: ${JWT_SECRET:-empleouni_secret_dev_change_in_prod}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-EmpleoUni <no-reply@empleouni.co>}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      CORS_ORIGIN: "*"
    ports:
      - "3008:3008"
    depends_on:
      - mailpit
    networks:
      - empleouni_network

  # ─────────────────────────────────────────
  # MongoDB — persistencia documental para auditoría
  # ─────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: empleouni_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - empleouni_network

  # ─────────────────────────────────────────
  # ms-audit — Node.js + MongoDB auditoría (Puerto 3007)
  # ─────────────────────────────────────────
  ms-audit:
    build:
      context: ./ms-audit
      dockerfile: Dockerfile
    container_name: empleouni_ms_audit
    restart: unless-stopped
    environment:
      PORT: 3007
      JWT_SECRET: ${JWT_SECRET:-empleouni_secret_dev_change_in_prod}
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: empleouni_audit
      CORS_ORIGIN: "*"
    ports:
      - "3007:3007"
    depends_on:
      - mongo
    networks:
      - empleouni_network

  # ─────────────────────────────────────────
  # ms-analytics — Python FastAPI analítica institucional (Puerto 3006)
  # ─────────────────────────────────────────
  ms-analytics:
    build:
      context: ./ms-analytics
      dockerfile: Dockerfile
    container_name: empleouni_ms_analytics
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET:-empleouni_secret_dev_change_in_prod}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_PERFILES: empleouni_perfiles
      DB_VACANTES: empleouni_vacantes
      DB_PRACTICAS: empleouni_practicas
      CORS_ORIGIN: "*"
    ports:
      - "3006:3006"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - empleouni_network

  # ─────────────────────────────────────────
  # frontend — Next.js (Puerto 3000)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL:-http://localhost:3001}
        NEXT_PUBLIC_PERFILES_URL: ${NEXT_PUBLIC_PERFILES_URL:-http://localhost:3002}
        NEXT_PUBLIC_VACANTES_URL: ${NEXT_PUBLIC_VACANTES_URL:-http://localhost:3003}
        NEXT_PUBLIC_MATCHING_URL: ${NEXT_PUBLIC_MATCHING_URL:-http://localhost:3004}
        NEXT_PUBLIC_PRACTICAS_URL: ${NEXT_PUBLIC_PRACTICAS_URL:-http://localhost:3005}
        NEXT_PUBLIC_ANALYTICS_URL: ${NEXT_PUBLIC_ANALYTICS_URL:-http://localhost:3006}
        NEXT_PUBLIC_AUDIT_URL: ${NEXT_PUBLIC_AUDIT_URL:-http://localhost:3007}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    container_name: empleouni_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL:-http://localhost:3001}
      NEXT_PUBLIC_PERFILES_URL: ${NEXT_PUBLIC_PERFILES_URL:-http://localhost:3002}
      NEXT_PUBLIC_VACANTES_URL: ${NEXT_PUBLIC_VACANTES_URL:-http://localhost:3003}
      NEXT_PUBLIC_MATCHING_URL: ${NEXT_PUBLIC_MATCHING_URL:-http://localhost:3004}
      NEXT_PUBLIC_PRACTICAS_URL: ${NEXT_PUBLIC_PRACTICAS_URL:-http://localhost:3005}
      NEXT_PUBLIC_ANALYTICS_URL: ${NEXT_PUBLIC_ANALYTICS_URL:-http://localhost:3006}
      NEXT_PUBLIC_AUDIT_URL: ${NEXT_PUBLIC_AUDIT_URL:-http://localhost:3007}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    ports:
      - "3000:3000"
    depends_on:
      - ms-auth
      - ms-perfiles
      - ms-vacantes
      - ms-matching
      - ms-practicas
      - ms-analytics
      - ms-audit
    networks:
      - empleouni_network
  # ─────────────────────────────────────────
  # pgAdmin — GUI opcional para ver la BD
  # ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: empleouni_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@empleouni.co
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - empleouni_network
    profiles:
      - tools

volumes:
  postgres_data:
    name: empleouni_postgres_data
  mongo_data:
    name: empleouni_mongo_data
  minio_data:
    name: empleouni_minio_data
  es_data:
    name: empleouni_es_data

networks:
  empleouni_network:
    name: empleouni_network
    driver: bridge
