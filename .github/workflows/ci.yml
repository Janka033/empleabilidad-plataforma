name: CI — EmpleoUni

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────────
  # JOB 1 — Tests ms-auth
  # ─────────────────────────────────────────────────
  test-ms-auth:
    name: Tests · ms-auth
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms-auth
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ms-auth/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-ms-auth
          path: ms-auth/coverage/

  # ─────────────────────────────────────────────────
  # JOB 2 — Tests ms-perfiles
  # ─────────────────────────────────────────────────
  test-ms-perfiles:
    name: Tests · ms-perfiles
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms-perfiles
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ms-perfiles/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-ms-perfiles
          path: ms-perfiles/coverage/

  # ─────────────────────────────────────────────────
  # JOB 3 — Tests ms-vacantes
  # ─────────────────────────────────────────────────
  test-ms-vacantes:
    name: Tests · ms-vacantes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ms-vacantes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ms-vacantes/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-ms-vacantes
          path: ms-vacantes/coverage/

  # ─────────────────────────────────────────────────
  # JOB 4 — Build Docker (solo en push)
  # ─────────────────────────────────────────────────
  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [test-ms-auth, test-ms-perfiles, test-ms-vacantes]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./ms-auth
          push: false
          tags: empleouni/ms-auth:${{ github.sha }}
      - uses: docker/build-push-action@v5
        with:
          context: ./ms-perfiles
          push: false
          tags: empleouni/ms-perfiles:${{ github.sha }}
      - uses: docker/build-push-action@v5
        with:
          context: ./ms-vacantes
          push: false
          tags: empleouni/ms-vacantes:${{ github.sha }}

  # ─────────────────────────────────────────────────
  # JOB 5 — Deploy (solo main)
  # ─────────────────────────────────────────────────
  deploy:
    name: Deploy · produccion
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      # Descomentar para habilitar push real a Docker Hub:
      # - uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}
      # - run: |
      #     docker buildx build --push -t ${{ secrets.DOCKERHUB_USERNAME }}/ms-auth:latest ./ms-auth
      #     docker buildx build --push -t ${{ secrets.DOCKERHUB_USERNAME }}/ms-perfiles:latest ./ms-perfiles
      #     docker buildx build --push -t ${{ secrets.DOCKERHUB_USERNAME }}/ms-vacantes:latest ./ms-vacantes
      - run: |
          echo "Pipeline completado"
          echo "SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"